name: ECS Deploy Action
description: Updates a container image in an ECS task definition and deploys it to an ECS service using official AWS actions

inputs:
  task-definition-family:
    description: "ECS task definition family name"
    required: true
  container-name:
    description: "Name of the container to update within the task definition"
    required: true
  image:
    description: "Full image URI (e.g. ghcr.io/org/repo:v1.0.0). Takes precedence over image-tag"
    required: false
  image-tag:
    description: "Image tag only (e.g. v1.0.0 or abc1234). Will be combined with the container's current image repository from the existing task definition. Ignored if 'image' is provided"
    required: false
  cluster:
    description: "ECS cluster name or ARN"
    required: true
  service:
    description: "ECS service name"
    required: true
  wait-for-service-stability:
    description: "Wait for the ECS service deployment to reach a steady state"
    required: false
    default: "true"
  wait-for-minutes:
    description: "Minutes to wait for service stability before timing out. Only applies when wait-for-service-stability is true"
    required: false
    default: "10"

outputs:
  task-definition-arn:
    description: "Full ARN of the newly registered task definition"
    value: ${{ steps.deploy.outputs.task-definition-arn }}
  service:
    description: "The name of the deployed ECS service"
    value: ${{ steps.deploy.outputs.service }}

runs:
  using: composite
  steps:
    - name: Validate inputs
      shell: bash
      run: |
        if [[ -z "${{ inputs.image }}" && -z "${{ inputs.image-tag }}" ]]; then
          echo "::error::Either 'image' (full URI) or 'image-tag' must be provided"
          exit 1
        fi

    - name: Resolve image URI from tag
      id: resolve-image
      if: ${{ inputs.image == '' && inputs.image-tag != '' }}
      shell: bash
      run: |
        TASK_DEF=$(aws ecs describe-task-definition \
          --task-definition "${{ inputs.task-definition-family }}" \
          --query 'taskDefinition' \
          --output json)

        CURRENT_IMAGE=$(echo "$TASK_DEF" | jq -r \
          --arg name "${{ inputs.container-name }}" \
          '.containerDefinitions[] | select(.name == $name) | .image')

        if [[ -z "$CURRENT_IMAGE" || "$CURRENT_IMAGE" == "null" ]]; then
          echo "::error::Container '${{ inputs.container-name }}' not found in task definition '${{ inputs.task-definition-family }}'"
          exit 1
        fi

        IMAGE_BASE="${CURRENT_IMAGE%:*}"
        NEW_IMAGE="${IMAGE_BASE}:${{ inputs.image-tag }}"

        echo "image=$NEW_IMAGE" >> $GITHUB_OUTPUT
        echo "Resolved image: $CURRENT_IMAGE -> $NEW_IMAGE"

    - name: Render task definition with new image
      id: render
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition-family: ${{ inputs.task-definition-family }}
        container-name: ${{ inputs.container-name }}
        image: ${{ inputs.image || steps.resolve-image.outputs.image }}

    - name: Deploy to ECS service
      id: deploy
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.render.outputs.task-definition }}
        service: ${{ inputs.service }}
        cluster: ${{ inputs.cluster }}
        wait-for-service-stability: false

    - name: Wait for deployment
      if: ${{ inputs.wait-for-service-stability == 'true' }}
      shell: bash
      run: |
        CLUSTER="${{ inputs.cluster }}"
        SERVICE="${{ inputs.service }}"
        TASK_DEF_ARN="${{ steps.deploy.outputs.task-definition-arn }}"
        TIMEOUT=$(( ${{ inputs.wait-for-minutes }} * 60 ))
        ELAPSED=0
        INTERVAL=15

        echo "Waiting for deployment of $TASK_DEF_ARN to stabilize (timeout: ${{ inputs.wait-for-minutes }}m)..."

        while [[ $ELAPSED -lt $TIMEOUT ]]; do
          DEPLOYMENTS=$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --query 'services[0].deployments' \
            --output json)

          # Find our deployment by task definition ARN
          OUR_DEPLOYMENT=$(echo "$DEPLOYMENTS" | jq -r \
            --arg arn "$TASK_DEF_ARN" \
            '[.[] | select(.taskDefinition == $arn)][0] // empty')

          if [[ -z "$OUR_DEPLOYMENT" || "$OUR_DEPLOYMENT" == "null" ]]; then
            echo "::error::Deployment not found. It may have been rolled back."
            exit 1
          fi

          STATUS=$(echo "$OUR_DEPLOYMENT" | jq -r '.status')
          ROLLOUT=$(echo "$OUR_DEPLOYMENT" | jq -r '.rolloutState // "N/A"')
          RUNNING=$(echo "$OUR_DEPLOYMENT" | jq -r '.runningCount')
          DESIRED=$(echo "$OUR_DEPLOYMENT" | jq -r '.desiredCount')

          echo "Status: $STATUS | Rollout: $ROLLOUT | Running: $RUNNING/$DESIRED | Elapsed: ${ELAPSED}s"

          if [[ "$ROLLOUT" == "COMPLETED" ]]; then
            echo "Deployment completed successfully"
            exit 0
          fi

          if [[ "$ROLLOUT" == "FAILED" ]]; then
            REASON=$(echo "$OUR_DEPLOYMENT" | jq -r '.rolloutStateReason // "unknown"')
            echo "::error::Deployment failed: $REASON"
            exit 1
          fi

          if [[ "$STATUS" == "INACTIVE" ]]; then
            echo "::error::Deployment became inactive (rolled back by circuit breaker)"
            exit 1
          fi

          sleep $INTERVAL
          ELAPSED=$((ELAPSED + INTERVAL))
        done

        echo "::error::Deployment timed out after ${{ inputs.wait-for-minutes }} minutes"
        exit 1
